<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出工天數紀錄 2026</title>
<style>
  body {
    font-family: "Microsoft JhengHei", sans-serif;
    background-color: #f6e8d2; /* 奶茶色背景 */
    color: #5c3a21; /* 深棕文字 */
    margin: 0;
    padding: 20px;
  }
  h1, h2 {
    text-align: center;
  }
  .calendar-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
  }
  .month {
    background-color: #fdf0e3;
    padding: 10px;
    border-radius: 10px;
    width: 220px;
  }
  .month table {
    width: 100%;
    border-collapse: collapse;
  }
  .month th, .month td {
    width: 14.28%;
    text-align: center;
    padding: 5px;
    cursor: pointer;
  }
  .month th {
    font-weight: bold;
  }
  .selected {
    background-color: #d8b195;
    border-radius: 50%;
    color: white;
  }
  .summary {
    margin-top: 5px;
    font-size: 14px;
    user-select: text; /* 可選取複製 */
  }
  .copy-box {
    margin-top: 20px;
    text-align: center;
  }
  .copy-box input {
    width: 70%;
    padding: 5px;
  }
  .copy-box button {
    padding: 5px 10px;
    margin-left: 5px;
    background-color: #d8b195;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    color: white;
  }
</style>
</head>
<body>

<h1>出工天數紀錄</h1>
<h2>2026年1月 - 12月</h2>

<div class="calendar-container" id="calendarContainer"></div>

<div class="copy-box">
  <input type="text" id="copyInput" readonly>
  <button onclick="copySummary()">複製</button>
</div>

<script>
const calendarContainer = document.getElementById('calendarContainer');
const copyInput = document.getElementById('copyInput');

const months = [
  '1月','2月','3月','4月','5月','6月',
  '7月','8月','9月','10月','11月','12月'
];

const daysOfWeek = ['日','一','二','三','四','五','六'];

const workdaysData = JSON.parse(localStorage.getItem('workdaysData')) || {};

function generateCalendar() {
  for (let m = 0; m < 12; m++) {
    const monthDiv = document.createElement('div');
    monthDiv.className = 'month';
    
    const monthTitle = document.createElement('h3');
    monthTitle.textContent = `${months[m]} 2026`;
    monthDiv.appendChild(monthTitle);
    
    const table = document.createElement('table');
    const thead = document.createElement('thead');
    const headerRow = document.createElement('tr');
    daysOfWeek.forEach(d => {
      const th = document.createElement('th');
      th.textContent = d;
      headerRow.appendChild(th);
    });
    thead.appendChild(headerRow);
    table.appendChild(thead);

    const tbody = document.createElement('tbody');
    const firstDay = new Date(2026, m, 1).getDay();
    const daysInMonth = new Date(2026, m+1, 0).getDate();
    let row = document.createElement('tr');
    // 空格補前面天數
    for (let i = 0; i < firstDay; i++) {
      row.appendChild(document.createElement('td'));
    }
    for (let d = 1; d <= daysInMonth; d++) {
      if ((firstDay + d -1) %7 ===0 && d!==1) {
        tbody.appendChild(row);
        row = document.createElement('tr');
      }
      const td = document.createElement('td');
      td.textContent = d;
      const key = `${m+1}-${d}`;
      if (workdaysData[key]) td.classList.add('selected');
      td.addEventListener('click', () => toggleDay(m+1,d,td));
      row.appendChild(td);
    }
    tbody.appendChild(row);
    table.appendChild(tbody);
    monthDiv.appendChild(table);

    const summary = document.createElement('div');
    summary.className = 'summary';
    summary.id = `summary-${m+1}`;
    monthDiv.appendChild(summary);
    
    calendarContainer.appendChild(monthDiv);
    
    updateSummary(m+1);
  }
}

function toggleDay(month, day, td) {
  const key = `${month}-${day}`;
  if (workdaysData[key]) {
    delete workdaysData[key];
    td.classList.remove('selected');
  } else {
    workdaysData[key] = true;
    td.classList.add('selected');
  }
  localStorage.setItem('workdaysData', JSON.stringify(workdaysData));
  updateSummary(month);
}

function updateSummary(month) {
  const days = Object.keys(workdaysData)
    .filter(k => parseInt(k.split('-')[0]) === month)
    .map(k => `${k.replace('-', '/')}`);
  const summaryDiv = document.getElementById(`summary-${month}`);
  summaryDiv.textContent = days.length ? `${days.join('、')}，共計${days.length}天` : '無出工天';
  copyInput.value = summaryDiv.textContent;
}

function copySummary() {
  copyInput.select();
  document.execCommand('copy');
  alert('已複製到剪貼簿');
}

generateCalendar();
</script>

</body>
</html>
